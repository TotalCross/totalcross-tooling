name: Validate tooling monorepo

on:
  push:
    paths:
      - '.github/workflows/governance.yml'
      - 'tools/**'
      - 'tests/**'
      - 'migration/**'
      - 'maven-plugin/**'
      - 'vscode-extension/**'
      - 'gradle-plugin/**'
      - 'LICENSE'
      - 'NOTICE'
      - 'README.md'
      - 'AUTHORS.md'
      - 'CONTRIBUTING.md'
      - 'AGENTS.md'
      - '.agent/**'
  pull_request:
    paths:
      - '.github/workflows/governance.yml'
      - 'tools/**'
      - 'tests/**'
      - 'migration/**'
      - 'maven-plugin/**'
      - 'vscode-extension/**'
      - 'gradle-plugin/**'
      - 'LICENSE'
      - 'NOTICE'
      - 'README.md'
      - 'AUTHORS.md'
      - 'CONTRIBUTING.md'
      - 'AGENTS.md'
      - '.agent/**'

jobs:
  governance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python3 tools/check-license-headers.py
      - run: python3 tools/check-imported-history.py
      - run: python3 -m unittest discover -s tests/license_headers -p 'test_*.py'

  maven-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - run: mvn test -q
        working-directory: maven-plugin

  vscode-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
        working-directory: vscode-extension
      - run: npm run audit
        working-directory: vscode-extension
      - run: npm run compile
        working-directory: vscode-extension

  gradle-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - run: ./gradlew test --no-daemon --max-workers=1 --console=plain
        working-directory: gradle-plugin
