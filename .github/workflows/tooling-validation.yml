name: Tooling validation

on:
  pull_request:
  push:
    branches: [main, migration/consolidate-tooling]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      maven: ${{ steps.filter.outputs.maven }}
      vscode: ${{ steps.filter.outputs.vscode }}
      gradle: ${{ steps.filter.outputs.gradle }}
      migration: ${{ steps.filter.outputs.migration }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            maven: ['maven-plugin/**', 'tools/**', 'migration/license-provenance.json']
            vscode: ['vscode-extension/**', 'tools/**', 'migration/license-provenance.json']
            gradle: ['gradle-plugin/**', 'tools/**', 'migration/license-provenance.json']
            migration: ['migration/**', 'tools/check-imported-history.py']
  maven-plugin:
    needs: changes
    if: needs.changes.outputs.maven == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - run: mvn --batch-mode --no-transfer-progress test package
        working-directory: maven-plugin
  vscode-extension:
    needs: changes
    if: needs.changes.outputs.vscode == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '25'}
      - run: npm ci && npm run audit && npm run compile && npm test
        working-directory: vscode-extension
  gradle-plugin:
    needs: changes
    if: needs.changes.outputs.gradle == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: zulu, java-version: '17'}
      - run: ./gradlew clean test publishToMavenLocal --console=plain
        working-directory: gradle-plugin
  history-audit:
    needs: changes
    if: needs.changes.outputs.migration == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p ../migration-source
          git clone --mirror https://github.com/TotalCross/totalcross-maven-plugin.git ../migration-source/totalcross-maven-plugin.git
          git clone --mirror https://github.com/TotalCross/totalcross-vscode-plugin.git ../migration-source/totalcross-vscode-plugin.git
          git clone --mirror https://github.com/TotalCross/totalcross-gradle-plugin.git ../migration-source/totalcross-gradle-plugin.git
          python3 tools/check-imported-history.py --source-root ../migration-source
