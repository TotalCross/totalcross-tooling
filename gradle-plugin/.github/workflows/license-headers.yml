name: License headers

on:
  push:
  pull_request:

jobs:
  license-headers:
    name: license-headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate license headers
        run: python3 tools/check-license-headers.py
      - name: Test validator
        run: python3 tests/license_headers/test_check_license_headers.py
